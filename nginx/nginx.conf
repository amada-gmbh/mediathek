worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip für statische Assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/pdf;

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.html;

        client_max_body_size 50m;

        # Healthcheck für Docker / Portainer
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Manifest (vom Sync-Skript generiert)
        location = /data/manifest.json {
            alias /app/data/manifest.json;
            add_header Cache-Control "no-cache, must-revalidate";
            add_header Access-Control-Allow-Origin *;
        }

        location = /data/config.json {
            alias /app/data/config.json;
            add_header Cache-Control "no-cache, must-revalidate";
            add_header Access-Control-Allow-Origin *;
        }

        # PDFs + Thumbnails lokal ausliefern (^~ verhindert Regex-Fang durch *.jpg-Regel)
        location ^~ /pdfs/ {
            alias /app/pdfs/;
            add_header Cache-Control "no-cache, must-revalidate";
            add_header Content-Disposition "inline";
        }

        # Kiosk-Frontend: Deploy-Updates sofort sichtbar (kein 7-Tage-JS-Cache)
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location = /js/app.js {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location /js/vendor/ {
            add_header Cache-Control "public, max-age=86400";
        }

        location ^~ /assets/ {
            add_header Cache-Control "public, max-age=604800";
            add_header Accept-Ranges bytes;
        }

        location = /css/style.css {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Statische Frontend-Dateien
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Sicherheit: versteckte Dateien blockieren
        location ~ /\. {
            deny all;
        }
    }
}
