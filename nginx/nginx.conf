worker_processes auto;
pid /run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    server_tokens off;

    # Security headers (LAN kiosk; tighten further behind a reverse proxy if exposed)
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; media-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # Gzip für statische Assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/pdf;

    server {
        listen 80;
        server_name _;
        root /var/www/html;
        index index.html;

        client_max_body_size 50m;

        # Healthcheck für Docker / Portainer
        location = /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 "ok\n";
        }

        # Language preferences API (container-internal Python server)
        location /api/ {
            proxy_pass http://127.0.0.1:8881;
            proxy_set_header Host $host;
            proxy_read_timeout 5s;
        }

        # Interne Sync-Konfiguration nicht ausliefern
        location ~* ^/data/sync\.env$ {
            deny all;
            return 404;
        }

        # Manifest (vom Sync-Skript generiert)
        location = /data/manifest.json {
            alias /app/data/manifest.json;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location = /data/config.json {
            alias /app/data/config.json;
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # PDFs + Thumbnails lokal ausliefern (^~ verhindert Regex-Fang durch *.jpg-Regel)
        location ^~ /pdfs/ {
            alias /app/pdfs/;
            add_header Cache-Control "no-cache, must-revalidate";
            add_header Content-Disposition "inline";
        }

        # Kiosk-Frontend: Deploy-Updates sofort sichtbar (kein 7-Tage-JS-Cache)
        location = /index.html {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location = /js/app.js {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        location /js/vendor/ {
            add_header Cache-Control "public, max-age=86400";
        }

        location ^~ /assets/ {
            add_header Cache-Control "public, max-age=604800";
            add_header Accept-Ranges bytes;
        }

        location = /css/style.css {
            add_header Cache-Control "no-cache, must-revalidate";
        }

        # Statische Frontend-Dateien
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "public, max-age=3600";
        }

        location ~* \.(png|jpg|jpeg|gif|svg|ico|woff2?)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }

        # Sicherheit: versteckte Dateien blockieren
        location ~ /\. {
            deny all;
        }
    }
}
